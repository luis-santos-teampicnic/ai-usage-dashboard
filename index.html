<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="refresh" content="3600">
<title>Claude Token Usage Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --picnic-red: #E1171E;
    --picnic-red-dark: #B40117;
    --picnic-green: #88A91E;
    --picnic-green-dark: #6B7A3B;
    --bg-dark: #1A1C24;
    --bg-card: #22252F;
    --text-primary: #F8F5F2;
    --text-secondary: #B5B0A8;
    --text-muted: #807B73;
    --gold: #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-dark);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: 1vh 2vw;
  }

  /* ── Header ──────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.8vh;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 1.2vw;
  }

  /* ── Background watermark logo ──────────────────── */
  .bg-logo {
    position: fixed;
    width: 75vw;
    height: 75vw;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-22deg);
    opacity: 0.06;
    pointer-events: none;
    z-index: 0;
  }

  .header-title {
    font-size: 2.2vw;
    font-weight: 900;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    text-transform: uppercase;
  }

  .header-title span {
    color: var(--picnic-red);
    text-shadow: 0 0 20px rgba(225,23,30,0.3);
  }

  .header-stats {
    display: flex;
    gap: 2vw;
  }

  .header-stat {
    text-align: center;
  }

  .header-stat-value {
    font-size: 1.8vw;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
    line-height: 1;
  }

  .header-stat-label {
    font-size: 0.6vw;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-top: 0.2vh;
  }

  .header-stat-primary .header-stat-value {
    color: #FF6A5A;
  }

  .header-stat-primary .header-stat-label {
    color: var(--picnic-red);
  }

  /* ── Panels ──────────────────────────────────────── */
  .leaderboard-wrapper {
    display: flex;
    gap: 1.5vw;
    flex: 1;
    min-height: 0;
  }

  .leaderboard-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-card);
    border-radius: 0.6vw;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.5vw;
    padding: 0.5vh 1vw;
    font-size: 0.85vw;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    flex-shrink: 0;
  }

  .section-header.top {
    background: linear-gradient(135deg, rgba(225,23,30,0.15), rgba(225,23,30,0.05));
    border-bottom: 1px solid rgba(225,23,30,0.3);
    border-left: 3px solid var(--picnic-red);
    color: var(--picnic-red);
  }

  .section-header.bottom {
    background: linear-gradient(135deg, rgba(136,169,30,0.12), rgba(136,169,30,0.04));
    border-bottom: 1px solid rgba(136,169,30,0.3);
    border-left: 3px solid var(--picnic-green);
    color: var(--picnic-green);
  }

  /* ── Right panel: always visible, data changes on expand ── */

  /* ── Expand toggle button ────────────────────────── */
  .expand-btn {
    position: fixed;
    bottom: 1.2vh;
    right: 1.2vw;
    background: none;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 0.25vw;
    color: rgba(255,255,255,0.18);
    font-size: 0.55vw;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.3vh 0.5vw;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    z-index: 100;
  }
  .expand-btn:hover {
    color: rgba(255,255,255,0.45);
    border-color: rgba(255,255,255,0.2);
  }

  .sort-btn {
    position: fixed;
    bottom: 1.2vh;
    left: 1.2vw;
    background: none;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 0.25vw;
    color: rgba(255,255,255,0.18);
    font-size: 0.55vw;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.3vh 0.5vw;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    z-index: 100;
  }
  .sort-btn:hover {
    color: rgba(255,255,255,0.45);
    border-color: rgba(255,255,255,0.2);
  }

  .section-header .icon { font-size: 1.2vw; }

  /* ── Grid layout ─────────────────────────────────── */
  /* Columns: rank | name | 2wk tokens | total tokens | PRs | PRs/1M */
  --grid: 2.2vw 13vw 5.5vw 5.5vw 2.5vw 1fr;

  .col-headers {
    display: grid;
    grid-template-columns: 2.2vw 13vw 10vw 5vw 2.5vw 1fr;
    padding: 0.3vh 1vw 0;
    flex-shrink: 0;
  }

  .col-group-label {
    text-align: center;
    font-size: 0.55vw;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding-bottom: 0.2vh;
    margin-bottom: 0;
  }

  .token-icon {
    height: 1.1em;
    width: 1.1em;
    vertical-align: -0.2em;
    display: inline-block;
  }

  .table-header {
    display: grid;
    grid-template-columns: 2.2vw 13vw 5vw 5vw 5vw 2.5vw 1fr;
    align-items: center;
    padding: 0.2vh 1vw;
    font-size: 0.6vw;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .table-body {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .row {
    display: grid;
    grid-template-columns: 2.2vw 13vw 5vw 5vw 5vw 2.5vw 1fr;
    align-items: center;
    padding: 0 1vw;
    border-bottom: 1px solid rgba(255,255,255,0.025);
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
    animation: row-slide-in 0.85s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .row:nth-child(odd) { background: rgba(255,255,255,0.015); }

  /* ── Rank ───────────────────────────────────────── */
  .rank {
    font-size: 0.85vw;
    font-weight: 800;
    text-align: center;
    color: var(--text-muted);
  }

  .rank-1 .rank { color: var(--gold); }
  .rank-2 .rank { color: var(--silver); }
  .rank-3 .rank { color: var(--bronze); }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.6vw;
    height: 1.6vw;
    border-radius: 50%;
    font-size: 0.8vw;
    font-weight: 900;
  }

  /* ── #1 flag — broadcast championship pennant ─────── */
  /*
     Design: Multi-layer metallic pennant in Picnic red.
     Outer shell = bright edge highlight gradient (simulates chrome bezel).
     ::before = inner body with 6-stop specular metallic red.
     ::after = atmospheric glow bloom behind the flag.
     Text = gold-to-white gradient fill with drop-shadow for crispness.
  */
  .rank-flag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 1.1vw;
    height: 1.5vw;
    /* Outer bezel — bright chrome-like edge that catches light */
    background: linear-gradient(
      170deg,
      rgba(255,255,255,0.9) 0%,
      rgba(255,230,150,0.7) 8%,
      #FFD700 20%,
      #FFE44D 45%,
      #C8A200 70%,
      #6B5600 100%
    );
    clip-path: polygon(0 0, 100% 0, 100% 72%, 50% 100%, 0 72%);
    z-index: 1;
  }

  /* Inner body — inset 1px to reveal the bezel edge,
     multi-stop metallic red simulating curved reflective surface */
  .rank-flag::before {
    content: '';
    position: absolute;
    inset: 1px;
    background: linear-gradient(
      180deg,
      #C8A200 0%,
      #FFD700 12%,
      #FFE44D 36%,
      #FFD700 52%,
      #B8960A 72%,
      #7A6400 100%
    );
    clip-path: polygon(0 0, 100% 0, 100% 72%, 50% 100%, 0 72%);
    z-index: 1;
  }

  /* Atmospheric glow bloom — radial gradient sitting behind the flag */
  .rank-flag::after {
    content: '';
    position: absolute;
    inset: -0.4vw;
    border-radius: 0.25vw;
    background: radial-gradient(
      ellipse at 50% 35%,
      rgba(255,215,0,0.5) 0%,
      rgba(255,215,0,0.18) 45%,
      transparent 72%
    );
    z-index: -1;
    animation: flag-bloom 2.8s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes flag-bloom {
    0%   { opacity: 0.55; transform: scale(0.96); }
    100% { opacity: 1;    transform: scale(1.12); }
  }

  /* ── #1 rolling gold border ──────────────────────── */
  .flag-ring {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  /* Spinning conic gold gradient — sits behind the flag as a "border" */
  .flag-ring::before {
    content: '';
    position: absolute;
    width: 1.35vw;
    height: 1.75vw;
    clip-path: polygon(0 0, 100% 0, 100% 72%, 50% 100%, 0 72%);
    background: conic-gradient(
      from var(--ring-angle, 0deg),
      #FFD700,
      #FFA500,
      #FF8C00,
      #FFFFE0,
      #FFD700,
      #FFA500,
      #FF6A00,
      #FFD700
    );
    z-index: 0;
    animation: gold-spin 2s linear infinite;
  }

  @property --ring-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  @keyframes gold-spin {
    to { --ring-angle: 360deg; }
  }

  /* #2 — spinning silver border */
  .flag-ring-2::before {
    background: conic-gradient(
      from var(--ring-angle, 0deg),
      #C0C0C0,
      #E8E8E8,
      #FFFFFF,
      #A0A0A8,
      #C0C0C0,
      #E8E8E8,
      #909098,
      #C0C0C0
    );
    animation: gold-spin 2.5s linear infinite;
  }

  /* #3 — spinning bronze border */
  .flag-ring-3::before {
    background: conic-gradient(
      from var(--ring-angle, 0deg),
      #CD7F32,
      #E8994C,
      #FFD0A0,
      #A0622A,
      #CD7F32,
      #E8994C,
      #8B5A1B,
      #CD7F32
    );
    animation: gold-spin 3s linear infinite;
  }


  .rank-flag-text {
    position: relative;
    z-index: 3;
    font-size: 0.6vw;
    font-weight: 900;
    line-height: 1;
    margin-top: -0.2vw;
    letter-spacing: -0.02em;
    background: linear-gradient(
      180deg,
      #1A1C24 0%,
      #2E3140 40%,
      #1A1C24 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 1px 0 rgba(255,255,255,0.3));
  }

  /* ── #2 pennant — silver ─────────────────────────── */
  .rank-flag-2 {
    background: linear-gradient(
      170deg,
      rgba(255,255,255,0.9) 0%,
      rgba(220,220,225,0.7) 8%,
      #A8A8B0 20%,
      #D0D0D8 45%,
      #808088 70%,
      #404048 100%
    );
  }

  .rank-flag-2::before {
    background: linear-gradient(
      180deg,
      #B0B0B8 0%,
      #C8C8D0 12%,
      #E0E0E8 36%,
      #C0C0C8 52%,
      #909098 72%,
      #585860 100%
    );
  }

  .rank-flag-2::after {
    background: radial-gradient(
      ellipse at 50% 35%,
      rgba(192,192,200,0.45) 0%,
      rgba(192,192,200,0.15) 45%,
      transparent 72%
    );
  }


  /* ── #3 pennant — bronze ─────────────────────────── */
  .rank-flag-3 {
    background: linear-gradient(
      170deg,
      rgba(255,230,200,0.85) 0%,
      rgba(220,170,120,0.6) 8%,
      #CD7F32 20%,
      #E0954A 45%,
      #8B5A1B 70%,
      #4A2E0A 100%
    );
  }

  .rank-flag-3::before {
    background: linear-gradient(
      180deg,
      #B8702C 0%,
      #CD7F32 12%,
      #E8994C 36%,
      #CD7F32 52%,
      #8B5A1B 72%,
      #5C3810 100%
    );
  }

  .rank-flag-3::after {
    background: radial-gradient(
      ellipse at 50% 35%,
      rgba(205,127,50,0.45) 0%,
      rgba(205,127,50,0.15) 45%,
      transparent 72%
    );
  }


  /* ── Name ───────────────────────────────────────── */
  .name {
    font-size: 0.9vw;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-right: 0.5vw;
  }

  .rank-1 .name, .rank-2 .name, .rank-3 .name { font-weight: 700; }

  /* ── Token columns ─────────────────────────────── */
  .tokens {
    font-size: 0.75vw;
    font-weight: 500;
    text-align: right;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    padding-right: 0.3vw;
  }

  .tokens-unit {
    font-size: 0.65em;
    font-weight: 500;
    color: rgba(128,123,115,0.7);
    margin-left: 0.1em;
  }

  .tokens-zero {
    color: var(--text-muted);
    font-style: italic;
    font-weight: 400;
  }

  .tokens-max {
    color: #FF6A5A;
    font-weight: 800;
    font-size: 0.9vw;
    background: linear-gradient(90deg, #FF4500, #FF6A00, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 6px rgba(255,69,0,0.5));
    animation: max-token-pulse 1.5s ease-in-out infinite alternate;
  }

  .tokens-max .tokens-unit {
    -webkit-text-fill-color: #FF8C00;
    color: #FF8C00;
  }

  @keyframes max-token-pulse {
    0% { filter: drop-shadow(0 0 4px rgba(255,69,0,0.4)); }
    100% { filter: drop-shadow(0 0 10px rgba(255,140,0,0.7)); }
  }

  /* ── Primary metric (PRs/1M) ─────────────────── */
  .metric-cell {
    display: flex;
    align-items: center;
    gap: 0.5vw;
    justify-content: flex-end;
  }

  .metric-bar-h {
    flex: 1;
    height: 0.7vh;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
    max-width: 12vw;
  }

  .metric-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--picnic-red), #FF6A00);
    transition: width 0.6s ease;
  }


  .metric-value {
    font-size: 1.05vw;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    color: #FF6A5A;
    min-width: 3.5vw;
    text-align: right;
  }

  .rank-1 .metric-value { color: var(--gold); text-shadow: 0 0 8px rgba(255,215,0,0.4); }
  .rank-2 .metric-value { color: #E0E0E0; }
  .rank-3 .metric-value { color: #D4944A; }

  .col-right { text-align: right; }
  .col-primary { color: var(--picnic-red) !important; font-weight: 700 !important; }

  /* ── Footer ────────────────────────────────────── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.4vh;
    flex-shrink: 0;
  }

  .footer-info {
    font-size: 0.7vw;
    color: var(--text-muted);
  }


  /* ── Broadcast: animated top bar ────────────────── */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--picnic-red), #FF6A00, var(--picnic-red), #FF6A00);
    background-size: 200% 100%;
    animation: top-bar-slide 3s linear infinite;
    z-index: 9999;
  }
  @keyframes top-bar-slide { 0%{background-position:0% 0} 100%{background-position:200% 0} }

  /* ── Broadcast: subtle scan-line overlay ────────── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Live dot ──────────────────────────────────── */
  .live-dot {
    display: inline-block;
    width: 0.4vw; height: 0.4vw;
    border-radius: 50%;
    background: var(--picnic-red);
    margin-right: 0.25vw;
    animation: live-pulse 2s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes live-pulse {
    0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(225,23,30,0.6)}
    50%{opacity:0.6;box-shadow:0 0 0 0.3vw rgba(225,23,30,0)}
  }

  /* ── Row entrance ──────────────────────────────── */
  /* animation-delay is set inline per row based on rank */

  /* Highlight sweep on each row after it lands */
  .row::after {
    content: '';
    position: absolute;
    top: 0; left: -100%; right: 0; bottom: 0;
    width: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 40%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.08) 60%, transparent 100%);
    animation: highlight-sweep 0.7s ease-out both;
    animation-delay: inherit;
    pointer-events: none;
  }

  @keyframes row-slide-in {
    0% { opacity: 0; transform: translateX(-4vw) scaleX(0.95); }
    60% { opacity: 1; transform: translateX(0.3vw) scaleX(1.01); }
    100% { opacity: 1; transform: translateX(0) scaleX(1); }
  }

  @keyframes highlight-sweep {
    0% { left: -100%; opacity: 0; }
    30% { opacity: 1; }
    100% { left: 100%; opacity: 0; }
  }

  /* ── Non-expanded: scale up row content to fill taller rows ── */
  .leaderboard-wrapper:not(.expanded) .name         { font-size: 1.25vw; }
  .leaderboard-wrapper:not(.expanded) .rank         { font-size: 1.2vw; }
  .leaderboard-wrapper:not(.expanded) .tokens       { font-size: 1.05vw; }
  .leaderboard-wrapper:not(.expanded) .metric-value { font-size: 1.45vw; }
  .leaderboard-wrapper:not(.expanded) .metric-bar-h { height: 1.1vh; }
  .leaderboard-wrapper:not(.expanded) .rank-flag {
    width: 1.55vw;
    height: 2.1vw;
  }
  .leaderboard-wrapper:not(.expanded) .flag-ring::before {
    width: 1.9vw;
    height: 2.45vw;
  }
  .leaderboard-wrapper:not(.expanded) .rank-flag-text { font-size: 0.85vw; }
</style>
</head>

<img src="logo.png" alt="" class="bg-logo">

<div class="header">
  <div class="header-left">
    <div class="header-title"><svg class="claude-logo" style="height:1em;width:1em;vertical-align:-0.1em;margin-right:0.25em;flex-shrink:0"><use href="#claude-icon"/></svg><span>Claude</span> Token Leaderboard</div>
  </div>
  <div class="header-right">
    <div class="header-stats">
      <div class="header-stat">
        <div class="header-stat-value" id="total-tokens-all">0</div>
        <div class="header-stat-label">Total Tokens</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-value" id="total-tokens-recent">0</div>
        <div class="header-stat-label">Last 2 Weeks</div>
      </div>
      <div class="header-stat header-stat-primary">
        <div class="header-stat-value" id="overall-prs-per-m">0</div>
        <div class="header-stat-label">Merged PRs² / 1M Tokens</div>
      </div>
    </div>
  </div>
</div>

<div class="leaderboard-wrapper">
  <div class="leaderboard-section">
    <div class="table-header">
      <div>#</div>
      <div>Name</div>
      <div class="col-right"><svg class="token-icon"><use href="#claude-icon"/></svg> Total</div>
      <div class="col-right"><svg class="token-icon"><use href="#claude-icon"/></svg> 2Wk</div>
      <div class="col-right"><svg class="token-icon"><use href="#claude-icon"/></svg> 1Wk</div>
      <div class="col-right">2Wk PRs</div>
      <div class="col-right col-primary">Merged PRs² / 1M Tokens</div>
    </div>
    <div class="table-body" id="top-body"></div>
  </div>

  <div class="leaderboard-section bottom-section">
    <div class="table-header">
      <div>#</div>
      <div>Name</div>
      <div class="col-right"><svg class="token-icon"><use href="#claude-icon"/></svg> Total</div>
      <div class="col-right"><svg class="token-icon"><use href="#claude-icon"/></svg> 2Wk</div>
      <div class="col-right"><svg class="token-icon"><use href="#claude-icon"/></svg> 1Wk</div>
      <div class="col-right">2Wk PRs</div>
      <div class="col-right col-primary">Merged PRs² / 1M Tokens</div>
    </div>
    <div class="table-body" id="bottom-body"></div>
  </div>
</div>

<button class="sort-btn" id="sort-btn" title="Toggle sort">Sort: PRs²/1M</button>
<button class="expand-btn" id="expand-btn" title="Show all">···</button>

<div class="footer">
  <div></div>
  <div class="footer-info" id="date-display"></div>
</div>

<script>
const CONFIG = {
  csvFile: 'data/ai_usage_data.csv',
  refreshMs: 60 * 1000
};

function formatTokens(n) {
  if (n === null || n === undefined || isNaN(n)) return '<span class="tokens-zero">—</span>';
  if (n === 0) return '<span class="tokens-zero">0</span>';
  const abs = Math.abs(n);
  let value, unit;
  if (abs >= 1e12) { value = n/1e12; unit = 'T'; }
  else if (abs >= 1e9) { value = n/1e9; unit = 'B'; }
  else if (abs >= 1e6) { value = n/1e6; unit = 'M'; }
  else if (abs >= 1e3) { value = n/1e3; unit = 'K'; }
  else return n.toString();
  let f;
  if (Math.abs(value)>=100) f = Math.round(value).toString();
  else if (Math.abs(value)>=10) f = value.toFixed(1).replace(/\.0$/,'');
  else f = value.toFixed(1);
  return `${f}<span class="tokens-unit">${unit}</span>`;
}

function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l=>l.trim());
  let dataDate = null;

  // First line starting with # is the data timestamp
  if (lines.length && lines[0].trim().startsWith('#')) {
    dataDate = lines.shift().replace(/^#\s*/, '').trim();
  }

  const entries = lines.map(line => {
    const p = line.split(',');
    return {
      name: p[0].trim(),
      totalTokens: parseInt(p[1],10)||0,
      recentTokens: p[2] ? parseInt(p[2].trim(),10)||0 : 0,
      weekTokens: p[3] ? parseInt(p[3].trim(),10)||0 : 0,
      prCount: p[4] ? parseInt(p[4].trim(),10)||0 : 0,
      prsPerMillion: p[5] ? parseFloat(p[5].trim())||0 : 0
    };
  }).sort(currentSortFn);

  return { entries, dataDate };
}

function renderRow(entry, rank, maxMetric, maxTotal, maxRecent, maxWeek) {
  const barPct = maxMetric > 0 ? (entry.prsPerMillion / maxMetric) * 100 : 0;
  const rankClass = rank <= 3 ? `rank-${rank}` : '';
  const isMaxTotal = entry.totalTokens === maxTotal;
  const isMaxRecent = entry.recentTokens === maxRecent;
  const isMaxWeek = entry.weekTokens === maxWeek;

  let rankContent;
  if (rank === 1) {
    rankContent = `<span class="flag-ring"><span class="rank-flag rank-flag-1"><span class="rank-flag-text">1</span></span></span>`;
  } else if (rank <= 3) {
    rankContent = `<span class="flag-ring flag-ring-${rank}"><span class="rank-flag rank-flag-${rank}"><span class="rank-flag-text">${rank}</span></span></span>`;
  } else {
    rankContent = rank;
  }

  const metricDisplay = entry.prsPerMillion > 0
    ? entry.prsPerMillion.toFixed(1)
    : (entry.totalTokens > 0 ? '<span class="tokens-zero">0.0</span>' : '<span class="tokens-zero">—</span>');

  return `
    <div class="row ${rankClass}" style="animation-delay:${((rank - 1) * 0.07 + 0.05).toFixed(2)}s">
      <div class="rank">${rankContent}</div>
      <div class="name">${escapeHtml(entry.name)}</div>
      <div class="tokens${isMaxTotal ? ' tokens-max' : ''}">${formatTokens(entry.totalTokens)}</div>
      <div class="tokens${isMaxRecent ? ' tokens-max' : ''}">${formatTokens(entry.recentTokens)}</div>
      <div class="tokens${isMaxWeek ? ' tokens-max' : ''}">${formatTokens(entry.weekTokens)}</div>
      <div class="tokens col-right">${entry.prCount > 0 ? entry.prCount : '<span class="tokens-zero">—</span>'}</div>
      <div class="metric-cell">
        <div class="metric-bar-h"><div class="metric-bar-fill" style="width:${barPct}%"></div></div>
        <div class="metric-value">${metricDisplay}</div>
      </div>
    </div>`;
}

function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function fmtPlain(n) {
  if(n>=1e12)return(n/1e12).toFixed(1).replace(/\.0$/,'')+'T';
  if(n>=1e9)return(n/1e9).toFixed(1).replace(/\.0$/,'')+'B';
  if(n>=1e6)return(n/1e6).toFixed(1).replace(/\.0$/,'')+'M';
  if(n>=1e3)return(n/1e3).toFixed(1).replace(/\.0$/,'')+'K';
  return n.toString();
}

let leaderboardData = null;

const sortModes = [
  { label: 'Sort: PRs²/1M', fn: (a,b) => b.prsPerMillion - a.prsPerMillion },
  { label: 'Sort: 1Wk Tokens', fn: (a,b) => b.weekTokens - a.weekTokens }
];
let currentSortIdx = 0;
let currentSortFn = sortModes[0].fn;

function renderPanels(expanded) {
  if (!leaderboardData) return;
  const { data, max, maxTotal, maxRecent, maxWeek } = leaderboardData;
  if (expanded) {
    document.getElementById('top-body').innerHTML    = data.slice(0,20).map((e,i)=>renderRow(e,i+1,max,maxTotal,maxRecent,maxWeek)).join('');
    document.getElementById('bottom-body').innerHTML = data.slice(20,40).map((e,i)=>renderRow(e,21+i,max,maxTotal,maxRecent,maxWeek)).join('');
  } else {
    document.getElementById('top-body').innerHTML    = data.slice(0,10).map((e,i)=>renderRow(e,i+1,max,maxTotal,maxRecent,maxWeek)).join('');
    document.getElementById('bottom-body').innerHTML = data.slice(10,20).map((e,i)=>renderRow(e,11+i,max,maxTotal,maxRecent,maxWeek)).join('');
  }
}

async function loadLeaderboard() {
  try {
    const resp = await fetch(CONFIG.csvFile+'?t='+Date.now());
    if (!resp.ok) throw new Error('Failed to load '+CONFIG.csvFile);
    const { entries: data, dataDate } = parseCSV(await resp.text());
    if (!data.length) return;

    if (dataDate) {
      const d = new Date(dataDate);
      const label = isNaN(d) ? dataDate : d.toLocaleDateString('en-GB', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      }) + ' · ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      document.getElementById('date-display').textContent = 'Data from ' + label + ' (' + tz + ')';
    }

    leaderboardData = {
      data,
      max: data[0].prsPerMillion,
      maxTotal: Math.max(...data.map(e=>e.totalTokens)),
      maxRecent: Math.max(...data.map(e=>e.recentTokens)),
      maxWeek: Math.max(...data.map(e=>e.weekTokens))
    };

    const expanded = document.querySelector('.leaderboard-wrapper').classList.contains('expanded');
    renderPanels(expanded);

    const totalAll = data.reduce((s,e)=>s+e.totalTokens,0);
    const totalRecent = data.reduce((s,e)=>s+e.recentTokens,0);
    const totalPrs = data.reduce((s,e)=>s+e.prCount,0);
    const overallPrsPerM = totalRecent > 0 ? (totalPrs / (totalRecent / 1e6)).toFixed(1) : '0';
    document.getElementById('total-tokens-all').textContent = fmtPlain(totalAll);
    document.getElementById('total-tokens-recent').textContent = fmtPlain(totalRecent);
    document.getElementById('overall-prs-per-m').textContent = overallPrsPerM;
  } catch(e) {
    document.getElementById('top-body').innerHTML = `<div style="color:var(--picnic-red);padding:1vw">${escapeHtml(e.message)}</div>`;
  }
}

loadLeaderboard();
setInterval(loadLeaderboard, CONFIG.refreshMs);

document.getElementById('expand-btn').addEventListener('click', () => {
  const wrapper = document.querySelector('.leaderboard-wrapper');
  const expanded = wrapper.classList.toggle('expanded');
  renderPanels(expanded);
});

document.getElementById('sort-btn').addEventListener('click', () => {
  currentSortIdx = (currentSortIdx + 1) % sortModes.length;
  currentSortFn = sortModes[currentSortIdx].fn;
  document.getElementById('sort-btn').textContent = sortModes[currentSortIdx].label;
  loadLeaderboard();
});
</script>
</body>
</html>
