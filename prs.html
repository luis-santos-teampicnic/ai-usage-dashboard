<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Activity Matrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --picnic-red: #E1171E;
    --picnic-red-dark: #B40117;
    --bg-dark: #1A1C24;
    --bg-card: #22252F;
    --text-primary: #F8F5F2;
    --text-secondary: #B5B0A8;
    --text-muted: #807B73;
    /* Heatmap scale — empty → low → mid → high → hot */
    --cell-empty: #2A2D36;
    --cell-1: #5C2226;
    --cell-2: #8B2A2A;
    --cell-3: #C4302B;
    --cell-4: #E1171E;
    --cell-5: #FF4D4D;
    --cell-hot: #FFD700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg-dark);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: 1vh 1.5vw;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.8vh;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 1vw;
  }

  .header-title {
    font-size: 1.6vw;
    font-weight: 900;
    letter-spacing: -0.03em;
    text-transform: uppercase;
  }

  .header-title span { color: var(--picnic-red); }

  /* ── Period toggle ──────────────────────────────── */
  .period-toggle {
    display: flex;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 0.3vw;
    overflow: hidden;
  }

  .period-btn {
    padding: 0.5vh 0.8vw;
    font-family: inherit;
    font-size: 0.6vw;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .period-btn:hover {
    color: var(--text-secondary);
    background: rgba(255,255,255,0.04);
  }

  .period-btn.active {
    color: var(--text-primary);
    background: var(--picnic-red);
    box-shadow: 0 0 10px rgba(225,23,30,0.3);
  }

  .header-stats {
    display: flex;
    gap: 2vw;
    align-items: center;
  }

  .header-stat { text-align: center; }

  .header-stat-value {
    font-size: 1.5vw;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .header-stat-label {
    font-size: 0.55vw;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    margin-top: 0.3vh;
  }

  .stat-red .header-stat-value { color: #FF6B5A; }
  .stat-gold .header-stat-value { color: #FFD54F; }
  .stat-green .header-stat-value { color: #9ABF1E; }

  /* ── Matrix container ───────────────────────────── */
  .matrix-wrapper {
    flex: 1;
    min-height: 0;
    background: var(--bg-card);
    border-radius: 0.5vw;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }


  .matrix-scroll {
    flex: 1;
    overflow: hidden;
    padding: 0.6vh 0.6vw;
    display: flex;
  }

  /* ── Grid / Heatmap ─────────────────────────────── */
  .matrix-grid {
    display: grid;
    gap: 1.5px;
    width: 100%;
    height: 100%;
  }

  /* Author labels along the top (vertical) */
  .author-label {
    font-size: 0.5vw;
    font-weight: 500;
    color: var(--text-muted);
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    white-space: nowrap;
    padding: 0 0.1vw 0.4vh 0.1vw;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Repo labels along the left (rows) */
  .repo-label {
    font-size: 0.5vw;
    font-weight: 500;
    color: var(--text-muted);
    text-align: right;
    padding-right: 0.5vw;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    align-self: center;
    line-height: 1;
  }

  /* Heatmap cell */
  .cell {
    border-radius: 2px;
    background: var(--cell-empty);
    position: relative;
    cursor: default;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    min-width: 0;
    min-height: 0;
  }

  .cell:hover {
    transform: scale(1.3);
    z-index: 10;
    box-shadow: 0 0 12px rgba(0,0,0,0.6);
  }

  /* Merged fill levels */
  .cell[data-level="1"] { background: var(--cell-1); }
  .cell[data-level="2"] { background: var(--cell-2); }
  .cell[data-level="3"] { background: var(--cell-3); }
  .cell[data-level="4"] { background: var(--cell-4); box-shadow: 0 0 6px rgba(225,23,30,0.3); }
  .cell[data-level="5"] { background: var(--cell-5); box-shadow: 0 0 8px rgba(255,77,77,0.4); }
  .cell[data-level="6"] {
    background: var(--cell-hot);
    box-shadow: 0 0 12px rgba(255,215,0,0.5);
    animation: pulse-gold 2s ease-in-out infinite alternate;
  }

  @keyframes pulse-gold {
    0%   { box-shadow: 0 0 8px rgba(255,215,0,0.4); }
    100% { box-shadow: 0 0 18px rgba(255,215,0,0.7); }
  }

  /* Created outline levels (soft cyan, visible but secondary) */
  .cell[data-created="1"] { outline: 1.5px solid rgba(80,180,220,0.3); outline-offset: -1px; }
  .cell[data-created="2"] { outline: 1.5px solid rgba(80,180,220,0.4); outline-offset: -1px; }
  .cell[data-created="3"] { outline: 2px solid rgba(80,190,230,0.45); outline-offset: -1px; }
  .cell[data-created="4"] { outline: 2px solid rgba(80,190,230,0.5); outline-offset: -1px; }
  .cell[data-created="5"] { outline: 2px solid rgba(80,200,240,0.55); outline-offset: -1px; }

  /* Cell inner count */
  .cell-count {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55vw;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .cell:hover .cell-count { opacity: 1; }

  /* Tooltip */
  .tooltip {
    display: none;
    position: fixed;
    background: #15171D;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 0.6vh 0.8vw;
    font-size: 0.6vw;
    color: var(--text-primary);
    pointer-events: none;
    z-index: 1000;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    max-width: 20vw;
    line-height: 1.5;
    backdrop-filter: blur(8px);
  }
  .tooltip.visible { display: block; }
  .tooltip strong { color: var(--picnic-red); }
  .tooltip .merged { color: #88A91E; }
  .tooltip .created { color: var(--text-secondary); }

  /* ── Legend ──────────────────────────────────────── */
  .legend {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4vw;
    padding: 0.6vh 0.5vw;
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .legend-label {
    font-size: 0.5vw;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 0.2vw;
  }

  .legend-cell {
    width: 0.9vw;
    height: 0.9vw;
    border-radius: 2px;
  }

  .legend-text {
    font-size: 0.5vw;
    font-weight: 500;
    color: var(--text-secondary);
    margin: 0 0.2vw;
  }

  /* ── Corner cell (top-left of grid) ─────────────── */
  .corner { /* empty top-left cell */ }

  /* ── Team header labels ─────────────────────────── */
  .team-label {
    font-size: 0.55vw;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-align: center;
    align-self: end;
    padding: 0.4vh 0.3vw;
    background: rgba(255,255,255,0.03);
    border-bottom: 2px solid rgba(225,23,30,0.35);
    border-radius: 3px 3px 0 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Team group spacer column (vertical, between author teams) ── */
  .team-spacer {
    width: 4px;
  }

  /* ── Repo team label (horizontal, left side) ──────── */
  .repo-team-label {
    font-size: 0.48vw;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    text-align: center;
    padding: 0.2vw 0.15vw;
    background: rgba(255,255,255,0.03);
    border-right: 2px solid rgba(225,23,30,0.35);
    border-radius: 0 0 3px 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Repo team spacer row (horizontal, between repo groups) ── */
  .repo-team-spacer {
    height: 4px;
  }

  /* ── Loading ────────────────────────────────────── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    font-size: 1.2vw;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title">PR Activity <span>Matrix</span></div>
    <div class="period-toggle" id="periodToggle">
      <button class="period-btn active" data-file="data/prs_data_week.csv">This Week</button>
      <button class="period-btn" data-file="data/prs_data_14days.csv">2 Weeks</button>
    </div>
  </div>
  <div class="header-stats" id="stats"></div>
</div>

<div class="matrix-wrapper">
  <div class="matrix-scroll" id="matrixScroll">
    <div class="loading" id="loading">Loading data…</div>
  </div>
  <div class="legend">
    <span class="legend-text">Merged:</span>
    <span class="legend-label">Less</span>
    <div class="legend-cell" style="background:var(--cell-empty)"></div>
    <div class="legend-cell" style="background:var(--cell-1)"></div>
    <div class="legend-cell" style="background:var(--cell-2)"></div>
    <div class="legend-cell" style="background:var(--cell-3)"></div>
    <div class="legend-cell" style="background:var(--cell-4)"></div>
    <div class="legend-cell" style="background:var(--cell-5)"></div>
    <div class="legend-cell" style="background:var(--cell-hot)"></div>
    <span class="legend-label">More</span>
    <span class="legend-text" style="margin-left:1.5vw;">Created:</span>
    <div class="legend-cell" style="background:var(--cell-empty); outline: 1.5px solid rgba(80,180,220,0.3); outline-offset:-1px;"></div>
    <div class="legend-cell" style="background:var(--cell-empty); outline: 2px solid rgba(80,190,230,0.45); outline-offset:-1px;"></div>
    <div class="legend-cell" style="background:var(--cell-empty); outline: 2px solid rgba(80,200,240,0.55); outline-offset:-1px;"></div>
    <span class="legend-text" style="margin-left:1.5vw;">Hover for details</span>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
function humanizeRepo(name) {
  return name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

let currentFile = 'data/prs_data_week.csv';

async function loadData(file) {
  const resp = await fetch(file || currentFile);
  const text = await resp.text();
  const lines = text.trim().split('\n');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    if (cols.length < 6) continue;
    // Skip duplicate header lines
    if (cols[0] === 'GITHUB_REPOSITORY_NAME') continue;
    rows.push({
      repo: cols[0] === 'picnic-cli' ? 'picnic-cli' : cols[0].replace(/^picnic-/, ''),
      repoFull: cols[0],
      githubUser: cols[1],
      created: parseInt(cols[2]) || 0,
      merged: parseInt(cols[3]) || 0,
      author: cols[4],
      team: cols[5],
      repoTeam: cols[6] || ''
    });
  }
  return rows;
}

function buildMatrix(rows) {
  // Aggregate: repo → author → { created, merged }, track author → team, repo → repoTeam
  const map = {};
  const repoTotals = {};
  const authorTotals = {};
  const authorTeam = {};
  const repoOwnerTeam = {};

  for (const r of rows) {
    if (!map[r.repo]) map[r.repo] = {};
    if (!map[r.repo][r.author]) map[r.repo][r.author] = { created: 0, merged: 0 };
    map[r.repo][r.author].created += r.created;
    map[r.repo][r.author].merged += r.merged;

    repoTotals[r.repo] = (repoTotals[r.repo] || 0) + r.merged;
    authorTotals[r.author] = (authorTotals[r.author] || 0) + r.merged;
    authorTeam[r.author] = r.team;
    // repoTeam is either a repo name (owned) or "Picnic" (shared) — normalize
    if (r.repoTeam && !repoOwnerTeam[r.repo]) repoOwnerTeam[r.repo] = r.repoTeam;
  }

  // Group repos by Repository Team column, sorted alphabetically; repos alphabetical within group
  const tailTeams = ['PPL', 'Picnic'];
  const repoTeams = [...new Set(Object.values(repoOwnerTeam))].sort((a, b) => {
    const ai = tailTeams.indexOf(a), bi = tailTeams.indexOf(b);
    if (ai >= 0 && bi >= 0) return ai - bi;
    if (ai >= 0) return 1;
    if (bi >= 0) return -1;
    return a.localeCompare(b);
  });
  const repos = [];
  const repoTeamBoundaries = [];
  for (const rt of repoTeams) {
    const teamRepos = Object.keys(repoTotals)
      .filter(r => repoOwnerTeam[r] === rt)
      .sort((a, b) => a.localeCompare(b));
    if (teamRepos.length === 0) continue;
    repoTeamBoundaries.push({ team: rt, startIndex: repos.length, count: teamRepos.length });
    repos.push(...teamRepos);
  }

  // Group authors by team (alphabetical), then alphabetical within each team
  const teams = [...new Set(Object.values(authorTeam))].sort((a, b) => a.localeCompare(b));
  const authors = [];
  const teamBoundaries = []; // { team, startIndex }
  for (const team of teams) {
    const teamAuthors = Object.keys(authorTeam)
      .filter(a => authorTeam[a] === team)
      .sort((a, b) => a.localeCompare(b));
    teamBoundaries.push({ team, startIndex: authors.length, count: teamAuthors.length });
    authors.push(...teamAuthors);
  }

  // Stats
  const totalCreated = rows.reduce((s, r) => s + r.created, 0);
  const totalMerged = rows.reduce((s, r) => s + r.merged, 0);
  const mergeRate = totalCreated > 0 ? Math.round((totalMerged / totalCreated) * 100) : 0;

  document.getElementById('stats').innerHTML = `
    <div class="header-stat stat-red">
      <div class="header-stat-value">${totalCreated}</div>
      <div class="header-stat-label">PRs Created</div>
    </div>
    <div class="header-stat stat-green">
      <div class="header-stat-value">${totalMerged}</div>
      <div class="header-stat-label">PRs Merged</div>
    </div>
    <div class="header-stat stat-gold">
      <div class="header-stat-value">${mergeRate}%</div>
      <div class="header-stat-label">Merge Rate</div>
    </div>
    <div class="header-stat">
      <div class="header-stat-value">${repos.length}</div>
      <div class="header-stat-label">Repositories</div>
    </div>
    <div class="header-stat">
      <div class="header-stat-value">${authors.length}</div>
      <div class="header-stat-label">Contributors</div>
    </div>
  `;

  // Find max merged for color scaling
  let maxMerged = 0;
  for (const repo of repos) {
    for (const author of authors) {
      const d = map[repo]?.[author];
      if (d && d.merged > maxMerged) maxMerged = d.merged;
    }
  }

  // Build grid: repos (rows) × authors (columns)
  const container = document.getElementById('matrixScroll');
  container.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'matrix-grid';
  // Build column template: repo-team-label, repo-label, then for each author team: (spacer if not first) + 1fr per author
  const colParts = ['auto', '9.5vw'];
  for (let t = 0; t < teamBoundaries.length; t++) {
    if (t > 0) colParts.push('4px');
    for (let i = 0; i < teamBoundaries[t].count; i++) colParts.push('1fr');
  }
  grid.style.gridTemplateColumns = colParts.join(' ');

  // Row template: team-header, author-names, then for each repo team group: (spacer if not first) + 1fr per repo
  const rowParts = ['auto', 'auto'];
  for (let rt = 0; rt < repoTeamBoundaries.length; rt++) {
    if (rt > 0) rowParts.push('4px');
    for (let i = 0; i < repoTeamBoundaries[rt].count; i++) rowParts.push('1fr');
  }
  grid.style.gridTemplateRows = rowParts.join(' ');

  // Helper: add spacer cell
  function addSpacer() {
    const s = document.createElement('div');
    s.className = 'team-spacer';
    grid.appendChild(s);
  }

  // Row 1: Author team header spans (2 empty cells for repo-team + repo-label columns)
  grid.appendChild(Object.assign(document.createElement('div'), { className: 'corner' }));
  grid.appendChild(Object.assign(document.createElement('div'), { className: 'corner' }));

  for (let t = 0; t < teamBoundaries.length; t++) {
    if (t > 0) addSpacer();
    const label = document.createElement('div');
    label.className = 'team-label';
    label.textContent = teamBoundaries[t].team;
    label.style.gridColumn = `span ${teamBoundaries[t].count}`;
    grid.appendChild(label);
  }

  // Row 2: Author names (2 empty cells for repo-team + repo-label columns)
  grid.appendChild(Object.assign(document.createElement('div'), { className: 'corner' }));
  grid.appendChild(Object.assign(document.createElement('div'), { className: 'corner' }));

  for (let t = 0; t < teamBoundaries.length; t++) {
    if (t > 0) addSpacer();
    const tb = teamBoundaries[t];
    for (let i = tb.startIndex; i < tb.startIndex + tb.count; i++) {
      const label = document.createElement('div');
      label.className = 'author-label';
      label.textContent = authors[i];
      grid.appendChild(label);
    }
  }

  // Build a lookup: author index → which team index it belongs to
  const authorTeamIdx = new Array(authors.length);
  for (let t = 0; t < teamBoundaries.length; t++) {
    const tb = teamBoundaries[t];
    for (let i = tb.startIndex; i < tb.startIndex + tb.count; i++) authorTeamIdx[i] = t;
  }

  // Helper: add a full spacer row (spans all columns)
  const totalCols = colParts.length;
  function addSpacerRow() {
    const s = document.createElement('div');
    s.className = 'repo-team-spacer';
    s.style.gridColumn = `1 / -1`;
    grid.appendChild(s);
  }

  // Rows = repos, grouped by repo owner team
  for (let rt = 0; rt < repoTeamBoundaries.length; rt++) {
    if (rt > 0) addSpacerRow();

    const rtb = repoTeamBoundaries[rt];

    // Repo team label — spans all rows in this group
    const rtLabel = document.createElement('div');
    rtLabel.className = 'repo-team-label';
    rtLabel.textContent = rtb.team;
    rtLabel.style.gridRow = `span ${rtb.count}`;
    grid.appendChild(rtLabel);

    for (let ri = rtb.startIndex; ri < rtb.startIndex + rtb.count; ri++) {
      const repo = repos[ri];

      // Only add repo-team-label for first repo in group (already added above)
      // Repo name label
      const repoLabel = document.createElement('div');
      repoLabel.className = 'repo-label';
      repoLabel.textContent = humanizeRepo(repo);
      repoLabel.title = repo;
      grid.appendChild(repoLabel);

      let prevTeam = 0;
      for (let ai = 0; ai < authors.length; ai++) {
        if (authorTeamIdx[ai] !== prevTeam) {
          addSpacer();
          prevTeam = authorTeamIdx[ai];
        }
      const author = authors[ai];
      const d = map[repo]?.[author];
      const merged = d ? d.merged : 0;
      const created = d ? d.created : 0;

      const cell = document.createElement('div');
      cell.className = 'cell';

      // Merged fill level (0-6)
      let level = 0;
      if (merged > 0) {
        if (maxMerged <= 1) {
          level = merged > 0 ? 4 : 0;
        } else {
          const ratio = merged / maxMerged;
          if (ratio <= 0.15)      level = 1;
          else if (ratio <= 0.3)  level = 2;
          else if (ratio <= 0.5)  level = 3;
          else if (ratio <= 0.7)  level = 4;
          else if (ratio < 1)     level = 5;
          else                    level = 6;
        }
      }

      cell.setAttribute('data-level', level);

      // Created outline level (1-5)
      if (created > 0) {
        const createdLevel = Math.min(created, 5);
        cell.setAttribute('data-created', createdLevel);
      }
      cell.dataset.repo = repo;
      cell.dataset.author = author;
      cell.dataset.merged = merged;
      cell.dataset.created = created;

      if (merged > 0) {
        const count = document.createElement('div');
        count.className = 'cell-count';
        count.textContent = merged;
        cell.appendChild(count);
      }

      grid.appendChild(cell);
    }
    } // end ri loop (repos in group)
  } // end rt loop (repo team groups)

  container.appendChild(grid);

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  container.addEventListener('mouseover', e => {
    const cell = e.target.closest('.cell');
    if (!cell) { tooltip.classList.remove('visible'); return; }

    const { repo, author, merged, created } = cell.dataset;
    tooltip.innerHTML = `
      <strong>${author}</strong> → ${humanizeRepo(repo)}<br>
      <span class="created">${created} created</span> · <span class="merged">${merged} merged</span>
    `;
    tooltip.classList.add('visible');
  });

  container.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  });

  container.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });
}

loadData(currentFile).then(buildMatrix);

document.getElementById('periodToggle').addEventListener('click', e => {
  const btn = e.target.closest('.period-btn');
  if (!btn || btn.classList.contains('active')) return;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFile = btn.dataset.file;
  loadData(currentFile).then(buildMatrix);
});
</script>
</body>
